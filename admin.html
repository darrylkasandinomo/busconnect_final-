<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BusConnect — Admin</title>
  <link rel="icon" href="img/buslogo.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Variabelen (zelfde als main.css) ── */
    :root {
      --bg:          #fdf8ed;
      --bg-card:     #f5efd8;
      --bg-hover:    #ede6cb;
      --border:      #d4cdb0;
      --text:        #1e1d1a;
      --text-muted:  #6b6556;
      --accent:      #f5a623;
      --accent-dark: #c97f0a;
      --accent-light:#fde9ba;
      --danger:      #e05252;
      --success:     #7ec85a;
      --nav-bg:      #1e1d1a;
      --nav-text:    #f5efd8;
      --shadow:      0 2px 12px rgba(0,0,0,0.08);
      --shadow-lg:   0 8px 32px rgba(0,0,0,0.14);
      --radius:      10px;
      --radius-lg:   18px;
      --font-display:'Fraunces', Georgia, serif;
      --font-body:   'DM Sans', system-ui, sans-serif;
    }
    [data-theme="dark"] {
      --bg:          #141210;
      --bg-card:     #1e1c18;
      --bg-hover:    #2a2721;
      --border:      #3a3730;
      --text:        #f0ead8;
      --text-muted:  #a09a88;
      --accent-light:#3a2e10;
      --accent-dark: #ffc24d;
      --nav-bg:      #0f0e0c;
      --nav-text:    #f0ead8;
      --shadow:      0 2px 12px rgba(0,0,0,0.3);
      --shadow-lg:   0 8px 32px rgba(0,0,0,0.5);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Nav ── */
    nav {
      background: var(--nav-bg);
      color: var(--nav-text);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-lg);
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--nav-text);
      text-decoration: none;
    }
    .nav-logo img { width: 32px; height: 32px; }
    .nav-logo span { color: var(--accent); }
    .nav-badge {
      background: var(--accent);
      color: #1e1d1a;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 99px;
      letter-spacing: 0.05em;
    }
    .nav-right { display: flex; align-items: center; gap: 1rem; }
    .nav-user { font-size: 0.85rem; color: var(--text-muted); }
    .btn-logout {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: var(--nav-text);
      padding: 0.4rem 0.9rem;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 0.85rem;
      font-family: var(--font-body);
      transition: background 0.2s;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.1); }

    /* ── Login scherm ── */
    #login-screen {
      min-height: calc(100vh - 64px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-lg);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 1.75rem;
    }
    .login-logo img { width: 56px; height: 56px; margin-bottom: 0.5rem; }
    .login-logo h1 {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
    }
    .login-logo p { font-size: 0.88rem; color: var(--text-muted); margin-top: 0.25rem; }
    .form-field { margin-bottom: 1.25rem; }
    .form-field label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .form-field input {
      width: 100%;
      padding: 0.7rem 0.9rem;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-family: var(--font-body);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    .form-field input:focus { border-color: var(--accent); }
    .btn-primary {
      width: 100%;
      padding: 0.8rem;
      background: var(--accent);
      color: #1e1d1a;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 700;
      font-family: var(--font-body);
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 0.5rem;
    }
    .btn-primary:hover { background: var(--accent-dark); }
    .btn-primary:active { transform: scale(0.98); }
    .login-error {
      background: #fde8e8;
      color: var(--danger);
      border: 1px solid #f5c0c0;
      border-radius: var(--radius);
      padding: 0.65rem 0.9rem;
      font-size: 0.87rem;
      margin-bottom: 1rem;
      display: none;
    }
    [data-theme="dark"] .login-error { background: #3a1515; border-color: #7a3030; }

    /* ── Dashboard ── */
    #dashboard-screen { display: none; }
    .dashboard-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    .dash-header { margin-bottom: 2rem; }
    .dash-header h2 {
      font-family: var(--font-display);
      font-size: 1.75rem;
      font-weight: 700;
    }
    .dash-header p { color: var(--text-muted); margin-top: 0.25rem; }

    /* Stats rij */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem 1.5rem;
      box-shadow: var(--shadow);
    }
    .stat-icon { font-size: 1.75rem; margin-bottom: 0.5rem; }
    .stat-val {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
    }
    .stat-label { font-size: 0.82rem; color: var(--text-muted); margin-top: 0.15rem; }

    /* Actieve bussen */
    .section-title {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      margin-bottom: 2rem;
      overflow: hidden;
    }
    .card-body { padding: 1.25rem 1.5rem; }
    .bus-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.65rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .bus-row:last-child { border-bottom: none; }
    .dot-online {
      width: 10px; height: 10px;
      background: var(--success);
      border-radius: 50%;
      flex-shrink: 0;
    }
    .empty-msg { color: var(--text-muted); font-size: 0.88rem; }

    /* Chauffeurs tabel */
    .driver-table { width: 100%; border-collapse: collapse; }
    .driver-table th {
      background: var(--bg-hover);
      text-align: left;
      padding: 0.7rem 1rem;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }
    .driver-table td {
      padding: 0.75rem 1rem;
      font-size: 0.88rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .driver-table tr:last-child td { border-bottom: none; }
    .driver-table tr:hover td { background: var(--bg-hover); }
    .btn-del {
      background: transparent;
      border: 1px solid var(--danger);
      color: var(--danger);
      padding: 0.3rem 0.7rem;
      border-radius: var(--radius);
      font-size: 0.78rem;
      font-family: var(--font-body);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .btn-del:hover { background: var(--danger); color: #fff; }

    /* Loading */
    .loading { color: var(--text-muted); font-size: 0.88rem; padding: 1rem 0; }

    @media (max-width: 640px) {
      .driver-table th:nth-child(3),
      .driver-table td:nth-child(3),
      .driver-table th:nth-child(4),
      .driver-table td:nth-child(4) { display: none; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="/">
      <img src="img/buslogo.svg" alt="BusConnect" />
      🚌 Bus<span>Connect</span>
    </a>
    <span class="nav-badge">ADMIN</span>
    <div class="nav-right">
      <span class="nav-user" id="nav-user"></span>
      <button class="btn-logout" id="btn-logout" style="display:none;" onclick="logout()">Uitloggen</button>
    </div>
  </nav>

  <!-- ── LOGIN ── -->
  <div id="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <img src="img/buslogo.svg" alt="BusConnect" />
        <h1>🚌 Bus<span style="color:var(--accent)">Connect</span></h1>
        <p>Admin inlogportaal</p>
      </div>

      <div class="login-error" id="login-error"></div>

      <form id="login-form" onsubmit="doLogin(event)">
        <div class="form-field">
          <label for="l-email">E-mailadres</label>
          <input type="email" id="l-email" placeholder="admin@busconnect.sr" required autocomplete="email" />
        </div>
        <div class="form-field">
          <label for="l-password">Wachtwoord</label>
          <input type="password" id="l-password" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn-primary" id="login-btn">🔐 Inloggen</button>
      </form>
    </div>
  </div>

  <!-- ── DASHBOARD ── -->
  <div id="dashboard-screen">
    <div class="dashboard-wrap">

      <div class="dash-header">
        <h2>📊 Admin Dashboard</h2>
        <p>Overzicht van alle BusConnect activiteiten.</p>
      </div>

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-icon">🚌</div>
          <div class="stat-val" id="stat-drivers">—</div>
          <div class="stat-label">Geregistreerde chauffeurs</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">📡</div>
          <div class="stat-val" id="stat-active">—</div>
          <div class="stat-label">Actieve bussen nu</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">📬</div>
          <div class="stat-val" id="stat-msgs">—</div>
          <div class="stat-label">Contactberichten</div>
        </div>
      </div>

      <!-- Actieve bussen -->
      <div class="section-title">📡 Live Bussen</div>
      <div class="card">
        <div class="card-body" id="buses-list">
          <p class="loading">Laden…</p>
        </div>
      </div>

      <!-- Chauffeurs tabel -->
      <div class="section-title">🚌 Chauffeurs</div>
      <div class="card">
        <div id="drivers-wrap">
          <p class="loading" style="padding:1rem 1.5rem;">Laden…</p>
        </div>
      </div>

    </div>
  </div>

  <script>
    const API = 'http://localhost:3000';

    // ── Thema ──
    const savedTheme = localStorage.getItem('busconnect-theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);

    // ── Token ──
    function getToken() { return localStorage.getItem('bc-admin-token'); }
    function saveToken(t) { localStorage.setItem('bc-admin-token', t); }
    function clearToken() { localStorage.removeItem('bc-admin-token'); }

    function parseJwt(token) {
      try { return JSON.parse(atob(token.split('.')[1])); } catch { return null; }
    }

    function isTokenValid(token) {
      if (!token) return false;
      const payload = parseJwt(token);
      if (!payload || payload.role !== 'admin') return false;
      return payload.exp * 1000 > Date.now();
    }

    // ── Init ──
    window.addEventListener('DOMContentLoaded', () => {
      const token = getToken();
      if (isTokenValid(token)) {
        showDashboard(token);
      }
    });

    // ── Login ──
    async function doLogin(e) {
      e.preventDefault();
      const email    = document.getElementById('l-email').value.trim();
      const password = document.getElementById('l-password').value;
      const btn      = document.getElementById('login-btn');
      const errEl    = document.getElementById('login-error');

      btn.textContent = '⏳ Bezig…';
      btn.disabled    = true;
      errEl.style.display = 'none';

      try {
        const res  = await fetch(`${API}/api/auth/admin/login`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (res.ok && data.success) {
          saveToken(data.token);
          showDashboard(data.token);
        } else {
          showError(data.error || 'Inloggen mislukt.');
        }
      } catch {
        showError('Kon geen verbinding maken met de server. Is de server actief?');
      } finally {
        btn.textContent = '🔐 Inloggen';
        btn.disabled    = false;
      }
    }

    function showError(msg) {
      const el = document.getElementById('login-error');
      el.textContent    = msg;
      el.style.display  = 'block';
    }

    // ── Dashboard ──
    function showDashboard(token) {
      const payload = parseJwt(token);
      document.getElementById('login-screen').style.display    = 'none';
      document.getElementById('dashboard-screen').style.display = 'block';
      document.getElementById('nav-user').textContent  = payload?.email || '';
      document.getElementById('btn-logout').style.display = 'inline-block';
      loadStats(token);
      loadDrivers(token);
    }

    async function loadStats(token) {
      try {
        const res  = await fetch(`${API}/api/admin/stats`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();

        document.getElementById('stat-drivers').textContent = data.driverCount ?? '—';
        document.getElementById('stat-msgs').textContent    = data.msgCount    ?? '—';

        const buses = data.activeBuses || [];
        document.getElementById('stat-active').textContent  = buses.length;

        const busesList = document.getElementById('buses-list');
        if (buses.length === 0) {
          busesList.innerHTML = '<p class="empty-msg">Geen actieve bussen op dit moment.</p>';
        } else {
          busesList.innerHTML = buses.map(b => `
            <div class="bus-row">
              <span class="dot-online"></span>
              <strong>${b.busId}</strong>
              <span style="color:var(--text-muted)">— ${b.driverName || 'Onbekend'}</span>
              <span style="margin-left:auto;font-size:0.78rem;color:var(--success);">Online ✓</span>
            </div>
          `).join('');
        }
      } catch {
        document.getElementById('buses-list').innerHTML = '<p class="empty-msg">Kon data niet ophalen.</p>';
      }
    }

    async function loadDrivers(token) {
      const wrap = document.getElementById('drivers-wrap');
      try {
        const res  = await fetch(`${API}/api/admin/drivers`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const rows = await res.json();

        if (!Array.isArray(rows) || rows.length === 0) {
          wrap.innerHTML = '<p class="empty-msg" style="padding:1rem 1.5rem;">Geen chauffeurs gevonden.</p>';
          return;
        }

        wrap.innerHTML = `
          <table class="driver-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Naam</th>
                <th>E-mail</th>
                <th>Route</th>
                <th>School</th>
                <th>Actie</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(d => `
                <tr id="row-${d.user_id}">
                  <td style="color:var(--text-muted);">${d.user_id}</td>
                  <td><strong>${d.voornaam} ${d.achternaam}</strong></td>
                  <td style="color:var(--text-muted);">${d.email}</td>
                  <td>${d.route || '—'}</td>
                  <td>${d.school || '—'}</td>
                  <td>
                    <button class="btn-del" onclick="deleteDriver(${d.user_id})">🗑 Verwijder</button>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      } catch {
        wrap.innerHTML = '<p class="empty-msg" style="padding:1rem 1.5rem;">Database niet beschikbaar.</p>';
      }
    }

    async function deleteDriver(id) {
      if (!confirm(`Chauffeur #${id} verwijderen? Dit kan niet ongedaan worden gemaakt.`)) return;
      const token = getToken();
      try {
        const res = await fetch(`${API}/api/admin/drivers/${id}`, {
          method:  'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        if (data.success) {
          const row = document.getElementById(`row-${id}`);
          if (row) row.remove();
        } else {
          alert('Verwijderen mislukt: ' + (data.error || 'onbekende fout'));
        }
      } catch {
        alert('Kon geen verbinding maken met de server.');
      }
    }

    // ── Logout ──
    function logout() {
      clearToken();
      document.getElementById('dashboard-screen').style.display = 'none';
      document.getElementById('login-screen').style.display     = 'flex';
      document.getElementById('btn-logout').style.display       = 'none';
      document.getElementById('nav-user').textContent           = '';
      document.getElementById('login-form').reset();
    }
  </script>
</body>
</html>
